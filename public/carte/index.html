<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#06120d" />
    <title>Mamadou Lamine Beye — Fondateur Richard AI</title>
    <meta name="description" content="Carte de visite digitale de Mamadou Lamine Beye, Fondateur de Richard AI." />

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: "#10B981" },
            fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] },
          },
        },
      };
    </script>

    <!-- Police moderne -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap"
      rel="stylesheet"
    />

    <!-- Icônes Lucide (CDN) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <style>
      html { -webkit-text-size-adjust: 100%; }
      body { font-family: "Inter", ui-sans-serif, system-ui, sans-serif; }
      /* Couches de fond en CSS pur (ne dépendent pas de Tailwind, donc fiables
         même si un CDN tarde) — chemin absolu pour marcher sur /carte aussi. */
      .bg-layer { position: fixed; inset: 0; overflow: hidden; }
      /* Fond clair : l'image est affichée telle quelle (chemin absolu).
         Animation : lente dérive (effet Ken Burns) pour donner vie au fond. */
      .bg-pattern {
        z-index: -3;
        background: url("/carte/image.png") center / cover no-repeat;
        filter: saturate(1.05);
        transform: scale(1.12);
        animation: bgDrift 34s ease-in-out infinite alternate;
        will-change: transform;
      }
      @keyframes bgDrift {
        0%   { transform: scale(1.12) translate3d(-1.6%, -1.1%, 0); }
        100% { transform: scale(1.12) translate3d(1.6%, 1.1%, 0); }
      }
      /* Voile blanc très léger pour adoucir le motif derrière le contenu. */
      .bg-overlay {
        z-index: -2;
        background: rgba(255, 255, 255, 0.14);
      }
      /* Halo vert animé (couleur de marque) qui pulse doucement. */
      .bg-glow {
        z-index: -1;
        background: radial-gradient(60% 50% at 50% 28%, rgba(69, 187, 30, 0.20), transparent 70%);
        animation: glowPulse 9s ease-in-out infinite alternate;
        will-change: opacity, transform;
      }
      @keyframes glowPulse {
        0%   { opacity: 0.5; transform: translateY(-2%) scale(1); }
        100% { opacity: 1;   transform: translateY(2%) scale(1.06); }
      }
      /* Accessibilité : pas d'animation si l'utilisateur préfère le mouvement réduit. */
      @media (prefers-reduced-motion: reduce) {
        .bg-pattern, .bg-glow { animation: none; transform: none; }
      }
    </style>
  </head>

  <body class="min-h-[100svh] bg-[#06120d] text-white antialiased">
    <!-- Couches de fond (animées) -->
    <div class="bg-layer bg-pattern" aria-hidden="true"></div>
    <div class="bg-layer bg-overlay" aria-hidden="true"></div>
    <div class="bg-layer bg-glow" aria-hidden="true"></div>

    <!-- Carte (sans panneau : contenu directement sur le fond clair) -->
    <main class="mx-auto flex min-h-[100svh] w-full max-w-sm flex-col items-center justify-center px-6 py-10 text-center">
      <!-- Photo de profil + badge logo (remplace photo.jpg par ta photo) -->
      <div class="relative inline-block">
        <img
          src="/carte/photo.jpg"
          alt="Photo de profil de Mamadou Lamine Beye"
          class="h-28 w-28 rounded-full border-[3px] border-[#45BB1E] object-cover shadow-xl"
          onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22><rect width=%22200%22 height=%22200%22 fill=%22%230b1f17%22/><circle cx=%22100%22 cy=%2278%22 r=%2236%22 fill=%22%2310B981%22/><path d=%22M40 178c0-33 27-58 60-58s60 25 60 58z%22 fill=%22%2310B981%22/></svg>';"
        />
        <!-- Badge logo Richard AI (bas-droite) -->
        <span class="absolute -bottom-1 -right-1 flex h-11 w-11 items-center justify-center rounded-full border-2 border-[#45BB1E] bg-white shadow-md">
          <img src="/carte/logo.png" alt="Logo Richard AI" class="h-8 w-8 object-contain" />
        </span>
      </div>

      <!-- Nom -->
      <h1
        class="mt-5 whitespace-nowrap font-extrabold uppercase tracking-tight text-[#0a1a14]"
        style="font-size: clamp(1.05rem, 6vw, 1.7rem);"
      >
        Mamadou Lamine BEYE
      </h1>

      <!-- Titre -->
      <p class="mt-1 text-sm font-semibold text-[#15803d]">Fondateur Richard AI</p>

      <!-- Boutons d'action (cadres verts #45BB1E = vert du fond) -->
      <nav class="mt-9 flex w-full flex-col gap-3.5" aria-label="Contacts">
        <a
          href="tel:+221771935720"
          class="group relative flex items-center justify-center rounded-full border-2 border-[#45BB1E] bg-white/75 px-12 py-3.5 backdrop-blur transition hover:bg-white active:scale-[.98]"
        >
          <i data-lucide="phone" class="absolute left-5 top-1/2 h-5 w-5 -translate-y-1/2 text-[#2f8f1e]"></i>
          <span class="min-w-0 truncate text-sm font-semibold text-[#0a1a14]">
            Appeler <span class="font-medium text-gray-600">• +221 77 193 57 20</span>
          </span>
        </a>

        <a
          href="mailto:mlbeye21@gmail.com"
          class="group relative flex items-center justify-center rounded-full border-2 border-[#45BB1E] bg-white/75 px-12 py-3.5 backdrop-blur transition hover:bg-white active:scale-[.98]"
        >
          <i data-lucide="mail" class="absolute left-5 top-1/2 h-5 w-5 -translate-y-1/2 text-[#2f8f1e]"></i>
          <span class="min-w-0 truncate text-sm font-semibold text-[#0a1a14]">
            Email <span class="font-medium text-gray-600">• mlbeye21@gmail.com</span>
          </span>
        </a>

        <a
          href="https://richardai-dev.nicomaticsenegal.com/"
          target="_blank"
          rel="noopener noreferrer"
          class="group relative flex items-center justify-center rounded-full border-2 border-[#45BB1E] bg-white/75 px-12 py-3.5 backdrop-blur transition hover:bg-white active:scale-[.98]"
        >
          <i data-lucide="globe" class="absolute left-5 top-1/2 h-5 w-5 -translate-y-1/2 text-[#2f8f1e]"></i>
          <span class="min-w-0 truncate text-sm font-semibold text-[#0a1a14]">
            Visiter le site <span class="font-medium text-gray-600">• richardai-dev.nicomaticsenegal.com</span>
          </span>
        </a>
      </nav>

      <!-- Bouton principal : enregistrer le contact -->
      <a
        href="/carte/contact.vcf"
        download="Mamadou-Lamine-Beye-Richard-AI.vcf"
        class="mt-5 flex w-full items-center justify-center gap-2.5 rounded-full bg-[#45BB1E] px-6 py-4 text-base font-bold text-[#04140d] shadow-lg shadow-[#45BB1E]/40 transition hover:bg-[#3aa017] active:scale-[.98]"
      >
        <i data-lucide="user-plus" class="h-5 w-5"></i>
        Enregistrer dans mes contacts
      </a>

      <footer class="mt-8 text-xs font-medium text-gray-600">
        © <span id="year"></span> Richard AI · Carte de visite digitale
      </footer>
    </main>

    <script>
      lucide.createIcons();
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
