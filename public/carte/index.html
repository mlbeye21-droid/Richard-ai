<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#06120d" />
    <title>Mamadou Lamine Beye — Fondateur Richard AI</title>
    <meta name="description" content="Carte de visite digitale de Mamadou Lamine Beye, Fondateur de Richard AI." />

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: "#10B981" },
            fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] },
          },
        },
      };
    </script>

    <!-- Police moderne -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap"
      rel="stylesheet"
    />

    <!-- Icônes Lucide (CDN) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <style>
      html { -webkit-text-size-adjust: 100%; }
      body { font-family: "Inter", ui-sans-serif, system-ui, sans-serif; }
      /* Couches de fond en CSS pur (ne dépendent pas de Tailwind, donc fiables
         même si un CDN tarde) — chemin absolu pour marcher sur /carte aussi. */
      .bg-layer { position: fixed; inset: 0; overflow: hidden; }
      /* Fond clair : l'image (motif) en base, adoucie pour laisser place aux vagues. */
      .bg-pattern {
        z-index: -4;
        background: url("/carte/image.png") center / cover no-repeat;
        filter: saturate(1.05);
      }
      .bg-overlay {
        z-index: -3;
        background: rgba(255, 255, 255, 0.28);
      }

      /* --- Vagues vertes animées (en bas) --- */
      .waves { position: fixed; left: 0; right: 0; bottom: 0; height: 46vh; z-index: -2; overflow: hidden; pointer-events: none; }
      .wave-row { position: absolute; bottom: 0; left: 0; display: flex; width: 200%; }
      .wave-row svg { width: 50%; height: 100%; display: block; }
      .wave1 { height: 48vh; opacity: 0.30; animation: waveFlow 13s linear infinite; }
      .wave2 { height: 42vh; opacity: 0.40; animation: waveFlow 20s linear infinite reverse; }
      .wave3 { height: 36vh; opacity: 0.24; animation: waveFlow 9s linear infinite; }
      @keyframes waveFlow {
        from { transform: translate3d(0, 0, 0); }
        to   { transform: translate3d(-50%, 0, 0); }
      }

      /* --- Scintillement : particules vertes qui clignotent --- */
      .sparkles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
      .spark {
        position: absolute; width: 6px; height: 6px; border-radius: 9999px;
        background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(69,187,30,0.9) 45%, transparent 70%);
        opacity: 0; transform: scale(0.5);
        animation: twinkle 3.2s ease-in-out infinite;
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0; transform: scale(0.4); }
        50%      { opacity: 1; transform: scale(1); }
      }

      /* Accessibilité : pas d'animation si l'utilisateur préfère le mouvement réduit. */
      @media (prefers-reduced-motion: reduce) {
        .wave1, .wave2, .wave3, .spark { animation: none; }
        .sparkles { display: none; }
      }
    </style>
  </head>

  <body class="min-h-[100svh] bg-[#06120d] text-white antialiased">
    <!-- Couches de fond (animées) -->
    <div class="bg-layer bg-pattern" aria-hidden="true"></div>
    <div class="bg-layer bg-overlay" aria-hidden="true"></div>

    <!-- Vagues vertes animées -->
    <div class="waves" aria-hidden="true">
      <div class="wave-row wave1">
        <svg viewBox="0 0 1440 220" preserveAspectRatio="none"><path fill="#45BB1E" d="M0,110 C240,40 480,180 720,110 C960,40 1200,180 1440,110 L1440,220 L0,220 Z"/></svg>
        <svg viewBox="0 0 1440 220" preserveAspectRatio="none"><path fill="#45BB1E" d="M0,110 C240,40 480,180 720,110 C960,40 1200,180 1440,110 L1440,220 L0,220 Z"/></svg>
      </div>
      <div class="wave-row wave2">
        <svg viewBox="0 0 1440 220" preserveAspectRatio="none"><path fill="#2f8f1e" d="M0,110 C240,40 480,180 720,110 C960,40 1200,180 1440,110 L1440,220 L0,220 Z"/></svg>
        <svg viewBox="0 0 1440 220" preserveAspectRatio="none"><path fill="#2f8f1e" d="M0,110 C240,40 480,180 720,110 C960,40 1200,180 1440,110 L1440,220 L0,220 Z"/></svg>
      </div>
      <div class="wave-row wave3">
        <svg viewBox="0 0 1440 220" preserveAspectRatio="none"><path fill="#7ad96a" d="M0,110 C240,40 480,180 720,110 C960,40 1200,180 1440,110 L1440,220 L0,220 Z"/></svg>
        <svg viewBox="0 0 1440 220" preserveAspectRatio="none"><path fill="#7ad96a" d="M0,110 C240,40 480,180 720,110 C960,40 1200,180 1440,110 L1440,220 L0,220 Z"/></svg>
      </div>
    </div>

    <!-- Scintillement (particules générées en JS) -->
    <div class="sparkles" id="sparkles" aria-hidden="true"></div>

    <!-- Carte (sans panneau : contenu directement sur le fond clair) -->
    <main class="mx-auto flex min-h-[100svh] w-full max-w-sm flex-col items-center justify-center px-6 py-10 text-center">
      <!-- Photo de profil + badge logo (remplace photo.jpg par ta photo) -->
      <div class="relative inline-block">
        <img
          src="/carte/photo.jpg"
          alt="Photo de profil de Mamadou Lamine Beye"
          class="h-28 w-28 rounded-full border-[3px] border-[#45BB1E] object-cover shadow-xl"
          onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22><rect width=%22200%22 height=%22200%22 fill=%22%230b1f17%22/><circle cx=%22100%22 cy=%2278%22 r=%2236%22 fill=%22%2310B981%22/><path d=%22M40 178c0-33 27-58 60-58s60 25 60 58z%22 fill=%22%2310B981%22/></svg>';"
        />
        <!-- Badge logo Richard AI (bas-droite) -->
        <span class="absolute -bottom-1 -right-1 flex h-11 w-11 items-center justify-center rounded-full border-2 border-[#45BB1E] bg-white shadow-md">
          <img src="/carte/logo.png" alt="Logo Richard AI" class="h-8 w-8 object-contain" />
        </span>
      </div>

      <!-- Nom -->
      <h1
        class="mt-5 whitespace-nowrap font-extrabold uppercase tracking-tight text-[#0a1a14]"
        style="font-size: clamp(1.05rem, 6vw, 1.7rem);"
      >
        Mamadou Lamine BEYE
      </h1>

      <!-- Titre -->
      <p class="mt-1 text-sm font-semibold text-[#15803d]">Fondateur Richard AI</p>

      <!-- Boutons d'action (cadres verts #45BB1E = vert du fond) -->
      <nav class="mt-9 flex w-full flex-col gap-3.5" aria-label="Contacts">
        <a
          href="tel:+221771935720"
          class="group relative flex items-center justify-center rounded-full border-2 border-[#45BB1E] bg-white/75 px-12 py-3.5 backdrop-blur transition hover:bg-white active:scale-[.98]"
        >
          <i data-lucide="phone" class="absolute left-5 top-1/2 h-5 w-5 -translate-y-1/2 text-[#2f8f1e]"></i>
          <span class="min-w-0 truncate text-sm font-semibold text-[#0a1a14]">
            Appeler <span class="font-medium text-gray-600">• +221 77 193 57 20</span>
          </span>
        </a>

        <a
          href="mailto:mlbeye21@gmail.com"
          class="group relative flex items-center justify-center rounded-full border-2 border-[#45BB1E] bg-white/75 px-12 py-3.5 backdrop-blur transition hover:bg-white active:scale-[.98]"
        >
          <i data-lucide="mail" class="absolute left-5 top-1/2 h-5 w-5 -translate-y-1/2 text-[#2f8f1e]"></i>
          <span class="min-w-0 truncate text-sm font-semibold text-[#0a1a14]">
            Email <span class="font-medium text-gray-600">• mlbeye21@gmail.com</span>
          </span>
        </a>

        <a
          href="https://richardai-dev.nicomaticsenegal.com/"
          target="_blank"
          rel="noopener noreferrer"
          class="group relative flex items-center justify-center rounded-full border-2 border-[#45BB1E] bg-white/75 px-12 py-3.5 backdrop-blur transition hover:bg-white active:scale-[.98]"
        >
          <i data-lucide="globe" class="absolute left-5 top-1/2 h-5 w-5 -translate-y-1/2 text-[#2f8f1e]"></i>
          <span class="min-w-0 truncate text-sm font-semibold text-[#0a1a14]">
            Visiter le site <span class="font-medium text-gray-600">• richardai-dev.nicomaticsenegal.com</span>
          </span>
        </a>
      </nav>

      <!-- Bouton principal : enregistrer le contact -->
      <a
        href="/carte/contact.vcf"
        download="Mamadou-Lamine-Beye-Richard-AI.vcf"
        class="mt-5 flex w-full items-center justify-center gap-2.5 rounded-full bg-[#45BB1E] px-6 py-4 text-base font-bold text-[#04140d] shadow-lg shadow-[#45BB1E]/40 transition hover:bg-[#3aa017] active:scale-[.98]"
      >
        <i data-lucide="user-plus" class="h-5 w-5"></i>
        Enregistrer dans mes contacts
      </a>

      <footer class="mt-8 text-xs font-medium text-gray-600">
        © <span id="year"></span> Richard AI · Carte de visite digitale
      </footer>
    </main>

    <script>
      // Lucide via CDN : si le chargement échoue, on ne bloque pas le reste.
      try { lucide.createIcons(); } catch (e) {}
      document.getElementById("year").textContent = new Date().getFullYear();

      // Génère les particules scintillantes (sauf si mouvement réduit)
      (function () {
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        const sp = document.getElementById("sparkles");
        if (!sp) return;
        for (let i = 0; i < 18; i++) {
          const s = document.createElement("span");
          s.className = "spark";
          const sz = (4 + Math.random() * 6).toFixed(1);
          s.style.width = s.style.height = sz + "px";
          s.style.left = (Math.random() * 100).toFixed(2) + "%";
          s.style.top = (Math.random() * 88).toFixed(2) + "%";
          s.style.animationDelay = (Math.random() * 3.2).toFixed(2) + "s";
          s.style.animationDuration = (2.4 + Math.random() * 2.4).toFixed(2) + "s";
          sp.appendChild(s);
        }
      })();
    </script>
  </body>
</html>
